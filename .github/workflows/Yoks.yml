      name: Persiapan

on: workflow_dispatch

jobs:

  build:

    runs-on: windows-latest

    steps:

    - name: Download Ngrok.

      run: Invoke-WebRequest https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-windows-amd64.zip -OutFile ngrok.zip

    - name: Extract Ngrok.

      run: Expand-Archive ngrok.zip

    - name: Mendownload Tools DDos.

      run: |

        Invoke-WebRequest https://github.com/gapiapja/vm2/raw/main/launcher/VincentBrutalToolsV1.exe -OutFile "VincentBrutalToolsV1.exe"

    - name: Auth

      run: .\ngrok\ngrok.exe authtoken $Env:NGROK_AUTH_TOKEN

      env:

        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Mengaktifkan Akses RDP

      run: | 

        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server'-name "fDenyTSConnections" -Value 0

        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1

        copy "VincentBrutalToolsV1.exe" "C:\Users\Public\Desktop\VincentBrutalToolsV1.exe"

    - name: Membuat Akun

      run: Set-LocalUser -Name "admin" -Password (ConvertTo-SecureString -AsPlainText "ApaJa" -Force)

    - name: Membuat Tunnel.

      run: Start-Process Powershell -ArgumentList '-Noexit -Command ".\ngrok\ngrok.exe tcp 3389"'

    - name: Download Waktu.

      run: Invoke-WebRequest https://raw.githubusercontent.com/gapiapja/WINRDP/main/timeout.ps1 -OutFile timeout.ps1

    - name: Keep Alive

      run: ./timeout.ps1
